<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakao Map Service</title>
    <style>
        /* 핵심 레이아웃: 1:3 분할 */
        :root {
            --point-blue: #0095ff;
            --bg-blue: #f0f8ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: sans-serif; overflow: hidden; }

        .app-container { display: flex; width: 100%; height: 100vh; }

        /* 왼쪽 검색 및 리스트 영역 */
        .sidebar {
            width: 350px;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-right: 1px solid #d1e3f1;
            z-index: 5;
        }

        .search-header { padding: 20px; background: var(--bg-blue); border-bottom: 1px solid #d1e3f1; }
        .search-box { display: flex; gap: 5px; }
        .search-box input { flex: 1; padding: 10px; border: 1px solid var(--point-blue); border-radius: 4px; outline: none; }
        .search-box button { padding: 10px 15px; background: var(--point-blue); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        #result-list { flex: 1; overflow-y: auto; }
        .item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .item:hover { background: var(--bg-blue); }
        .item .title { font-weight: bold; color: #333; font-size: 15px; }
        .item .addr { font-size: 13px; color: #777; margin-top: 4px; }

        /* 오른쪽 지도 영역 */
        .map-wrapper { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }

        /* 위치 추적 플로팅 버튼 */
        .gps-button {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            padding: 12px 18px;
            background: #fff;
            border: 2px solid var(--point-blue);
            border-radius: 50px;
            font-weight: bold;
            color: var(--point-blue);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .gps-button.active { background: var(--point-blue); color: #fff; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="search-header">
            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소 입력 후 엔터" onkeypress="if(event.keyCode==13) searchPlaces()">
                <button onclick="searchPlaces()">검색</button>
            </div>
        </div>
        <div id="result-list"></div>
    </aside>

    <main class="map-wrapper">
        <div id="map"></div>
        <button id="track-btn" class="gps-button" onclick="toggleTracking()">내 위치 추적 꺼짐</button>
    </main>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=cbbdd4b68f27b3ad77d20589390becce&libraries=services"></script>

<script>
    let map;
    let ps; // 장소 검색 객체
    let markers = []; // 검색 결과 마커 관리 배열
    let myLocationMarker = null; // 내 위치 마커
    let watchId = null; // 실시간 추적 ID

    // 1. 지도 생성 및 현재 위치 초기 중심 설정
    function initMap() {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.5668, 126.9786), // 기본 서울시청
            level: 5
        };
        map = new kakao.maps.Map(container, options);
        ps = new kakao.maps.services.Places();

        // 페이지 진입 시 위치 권한 확인 후 이동
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                const moveLatLon = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                map.setCenter(moveLatLon);
                updateMyMarker(moveLatLon);
            });
        }
    }

    // 2. 키워드 검색 로직
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;
        if (!keyword.trim()) return alert("장소를 입력해주세요!");

        ps.keywordSearch(keyword, (data, status) => {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data);
            } else {
                alert("검색 결과가 없습니다.");
            }
        });
    }

    // 3. 검색 결과 마커 및 리스트 출력
    function displayPlaces(places) {
        const listEl = document.getElementById('result-list');
        const bounds = new kakao.maps.LatLngBounds();
        
        listEl.innerHTML = '';
        removeMarkers();

        places.forEach((place, index) => {
            const position = new kakao.maps.LatLng(place.y, place.x);
            const marker = new kakao.maps.Marker({ position, map });
            
            markers.push(marker);
            bounds.extend(position);

            const item = document.createElement('div');
            item.className = 'item';
            item.innerHTML = `<div class="title">${place.place_name}</div>
                              <div class="addr">${place.road_address_name || place.address_name}</div>`;
            
            // 리스트 아이템 클릭 시 해당 위치 이동
            item.onclick = () => {
                map.panTo(position);
                map.setLevel(3);
            };
            listEl.appendChild(item);
        });

        // 모든 검색 결과가 보이도록 지도 범위 조정
        map.setBounds(bounds);
    }

    // 4. 실시간 위치 추적 토글 기능
    function toggleTracking() {
        const btn = document.getElementById('track-btn');

        if (watchId === null) {
            if (!navigator.geolocation) return alert("GPS를 지원하지 않는 브라우저입니다.");
            
            btn.classList.add('active');
            btn.innerText = "내 위치 추적 켜짐";

            // watchPosition으로 실시간 좌표 감시
            watchId = navigator.geolocation.watchPosition(position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const currentPos = new kakao.maps.LatLng(lat, lng);
                
                updateMyMarker(currentPos);
                map.panTo(currentPos); // 사용자가 이동하면 지도도 부드럽게 이동
            }, error => {
                console.error(error);
                stopTracking();
            }, { enableHighAccuracy: true });
        } else {
            stopTracking();
        }
    }

    function stopTracking() {
        const btn = document.getElementById('track-btn');
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
        btn.classList.remove('active');
        btn.innerText = "내 위치 추적 꺼짐";
    }

    // 내 위치 마커 업데이트 (이미지 차별화)
    function updateMyMarker(pos) {
        if (myLocationMarker) {
            myLocationMarker.setPosition(pos);
        } else {
            const image = new kakao.maps.MarkerImage(
                'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
                new kakao.maps.Size(24, 35)
            );
            myLocationMarker = new kakao.maps.Marker({ position: pos, image, map });
        }
    }

    function removeMarkers() {
        markers.forEach(m => m.setMap(null));
        markers = [];
    }

    // 앱 기동
    initMap();
</script>

</body>
</html>
