<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healing Kakao Map Service</title>

    <style>
        :root {
            --point-blue: #0095ff;
            --bg-blue: #f0f8ff;
            --border-color: #d1e3f1;
            --green-color: #27c93f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Malgun Gothic', sans-serif;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 사이드바 */
        .sidebar {
            width: 360px;
            display: flex;
            flex-direction: column;
            background: white;
            border-right: 1px solid var(--border-color);
            z-index: 5;
        }

        /* 상단 헤더 */
        .search-header {
            padding: 20px;
            background: var(--bg-blue);
            border-bottom: 1px solid var(--border-color);
        }

        .service-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        /* 탭 */
        .tab-container {
            display: flex;
            gap: 10px;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #e5eef7;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-button.active {
            background: var(--point-blue);
            color: white;
        }

        /* 결과 리스트 */
        #result-list {
            flex: 1;
            overflow-y: auto;
        }

        .item {
            padding: 16px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: 0.2s;
        }

        .item:hover {
            background: var(--bg-blue);
        }

        .place-title {
            font-size: 15px;
            font-weight: bold;
            color: #333;
        }

        .place-address {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            line-height: 1.5;
        }

        /* 지도 */
        .map-wrapper {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* GPS 버튼 */
        .gps-button {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;

            padding: 12px 18px;

            border: 2px solid var(--point-blue);
            border-radius: 50px;

            background: white;
            color: var(--point-blue);

            font-weight: bold;
            cursor: pointer;

            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .gps-button.active {
            background: var(--point-blue);
            color: white;
        }

        /* 커스텀 팝업 */
        .custom-popup {
            width: 260px;
            padding: 16px;

            border-radius: 14px;
            background: white;

            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .popup-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--point-blue);
            margin-bottom: 10px;
        }

        .popup-address {
            font-size: 13px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .popup-link {
            display: inline-block;

            padding: 9px 14px;

            border-radius: 8px;

            background: var(--point-blue);
            color: white;

            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
        }

        .popup-link:hover {
            opacity: 0.9;
        }

        /* 내 위치 초록 점 */
        .my-location-dot {
            width: 18px;
            height: 18px;

            background: var(--green-color);

            border: 4px solid rgba(39, 201, 63, 0.3);
            border-radius: 50%;
        }
    </style>
</head>

<body>

<div class="app-container">

    <!-- 사이드바 -->
    <aside class="sidebar">

        <div class="search-header">

            <div class="service-title">
                힐링 치유 지도 🌿
            </div>

            <!-- 탭 -->
            <div class="tab-container">

                <button
                    class="tab-button active"
                    onclick="changeCategory('CT1', this)"
                >
                    문화시설
                </button>

                <button
                    class="tab-button"
                    onclick="changeCategory('CE7', this)"
                >
                    카페
                </button>

            </div>

        </div>

        <!-- 결과 리스트 -->
        <div id="result-list"></div>

    </aside>

    <!-- 지도 -->
    <main class="map-wrapper">

        <div id="map"></div>

        <button
            id="track-button"
            class="gps-button"
            onclick="toggleTracking()"
        >
            내 위치 추적 꺼짐
        </button>

    </main>

</div>

<!-- 카카오맵 SDK -->
<script
    type="text/javascript"
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=cbbdd4b68f27b3ad77d20589390becce&libraries=services">
</script>

<script>

    let map;

    let placeService;

    let markers = [];

    let customOverlay;

    let myLocationOverlay = null;

    let watchId = null;

    let currentCategory = 'CT1';

    // 지도 초기화
    function initMap() {

        const container = document.getElementById('map');

        const options = {
            center: new kakao.maps.LatLng(37.5668, 126.9786),
            level: 5
        };

        map = new kakao.maps.Map(container, options);

        placeService = new kakao.maps.services.Places();

        customOverlay = new kakao.maps.CustomOverlay({
            zIndex: 10
        });

        // 현재 위치 가져오기
        if (navigator.geolocation) {

            navigator.geolocation.getCurrentPosition(position => {

                const latitude = position.coords.latitude;
                const longitude = position.coords.longitude;

                const currentPosition = new kakao.maps.LatLng(
                    latitude,
                    longitude
                );

                map.setCenter(currentPosition);

                updateMyLocation(currentPosition);

                // 최초 카테고리 검색
                searchCategory(currentCategory);

            });

        } else {

            searchCategory(currentCategory);

        }
    }

    // 카테고리 변경
    function changeCategory(categoryCode, buttonElement) {

        currentCategory = categoryCode;

        // 기존 마커 제거
        removeMarkers();

        // 기존 팝업 제거
        customOverlay.setMap(null);

        // 기존 리스트 제거
        document.getElementById('result-list').innerHTML = '';

        // 탭 active 변경
        document.querySelectorAll('.tab-button').forEach(button => {
            button.classList.remove('active');
        });

        buttonElement.classList.add('active');

        // 새 카테고리 검색
        searchCategory(categoryCode);
    }

    // 카테고리 검색
    function searchCategory(categoryCode) {

        const center = map.getCenter();

        placeService.categorySearch(
            categoryCode,
            placesSearchCallback,
            {
                location: center,
                radius: 5000
            }
        );
    }

    // 검색 결과 콜백
    function placesSearchCallback(data, status) {

        if (status === kakao.maps.services.Status.OK) {

            displayPlaces(data);

        } else {

            alert("검색 결과가 없습니다.");

        }
    }

    // 장소 표시
    function displayPlaces(places) {

        const listElement = document.getElementById('result-list');

        const bounds = new kakao.maps.LatLngBounds();

        listElement.innerHTML = '';

        removeMarkers();

        places.forEach(place => {

            const position = new kakao.maps.LatLng(
                place.y,
                place.x
            );

            // 마커 생성
            const marker = createMarker(position);

            bounds.extend(position);

            // 리스트 생성
            const item = createListItem(place);

            // 마커 클릭
            kakao.maps.event.addListener(marker, 'click', function() {

                showCustomPopup(marker, place);

            });

            // 리스트 클릭
            item.onclick = function() {

                map.panTo(position);

                map.setLevel(3);

                showCustomPopup(marker, place);
            };

            listElement.appendChild(item);

        });

        map.setBounds(bounds);
    }

    // 마커 생성
    function createMarker(position) {

        const marker = new kakao.maps.Marker({
            map: map,
            position: position
        });

        markers.push(marker);

        return marker;
    }

    // 리스트 아이템 생성
    function createListItem(place) {

        const item = document.createElement('div');

        item.className = 'item';

        item.innerHTML = `
            <div class="place-title">
                ${place.place_name}
            </div>

            <div class="place-address">
                ${place.road_address_name || place.address_name}
            </div>
        `;

        return item;
    }

    // 커스텀 팝업 표시
    function showCustomPopup(marker, place) {

        const popupContent = `
            <div class="custom-popup">

                <div class="popup-title">
                    ${place.place_name}
                </div>

                <div class="popup-address">
                    📍 ${place.road_address_name || place.address_name}
                </div>

                <a
                    class="popup-link"
                    href="${place.place_url}"
                    target="_blank"
                >
                    카카오맵에서 보기
                </a>

            </div>
        `;

        customOverlay.setContent(popupContent);

        customOverlay.setPosition(marker.getPosition());

        customOverlay.setMap(map);
    }

    // 기존 마커 제거
    function removeMarkers() {

        markers.forEach(marker => {
            marker.setMap(null);
        });

        markers = [];
    }

    // 내 위치 표시 업데이트
    function updateMyLocation(position) {

        const content = `
            <div class="my-location-dot"></div>
        `;

        if (myLocationOverlay) {

            myLocationOverlay.setPosition(position);

        } else {

            myLocationOverlay = new kakao.maps.CustomOverlay({
                position: position,
                content: content
            });

            myLocationOverlay.setMap(map);
        }
    }

    // 실시간 위치 추적
    function toggleTracking() {

        const button = document.getElementById('track-button');

        if (watchId === null) {

            if (!navigator.geolocation) {

                alert("Geolocation을 지원하지 않습니다.");
                return;
            }

            button.classList.add('active');

            button.innerText = "내 위치 추적 켜짐";

            watchId = navigator.geolocation.watchPosition(position => {

                const latitude = position.coords.latitude;
                const longitude = position.coords.longitude;

                const currentPosition = new kakao.maps.LatLng(
                    latitude,
                    longitude
                );

                updateMyLocation(currentPosition);

                map.panTo(currentPosition);

            }, null, {
                enableHighAccuracy: true
            });

        } else {

            stopTracking();
        }
    }

    // 위치 추적 종료
    function stopTracking() {

        const button = document.getElementById('track-button');

        navigator.geolocation.clearWatch(watchId);

        watchId = null;

        button.classList.remove('active');

        button.innerText = "내 위치 추적 꺼짐";
    }

    // 앱 시작
    initMap();

</script>

</body>
</html>
