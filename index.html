<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakao Keyword Search Service</title>
    <style>
        :root {
            --point-blue: #0095ff;
            --bg-blue: #f0f8ff;
            --border-color: #d1e3f1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }

        .app-container { display: flex; width: 100%; height: 100vh; }

        /* 사이드바 스타일 */
        .sidebar {
            width: 350px;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-right: 1px solid var(--border-color);
            z-index: 5;
        }

        .search-header { padding: 20px; background: var(--bg-blue); border-bottom: 1px solid var(--border-color); }
        .search-box { display: flex; gap: 5px; }
        .search-box input { flex: 1; padding: 10px; border: 1px solid var(--point-blue); border-radius: 4px; outline: none; }
        .search-box button { padding: 10px 15px; background: var(--point-blue); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* 결과 리스트 스타일 */
        #result-list { flex: 1; overflow-y: auto; }
        .item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .item:hover { background: var(--bg-blue); }
        .item .title { font-weight: bold; color: #333; font-size: 15px; }
        .item .addr { font-size: 12px; color: #777; margin-top: 4px; }

        /* 지도 및 버튼 스타일 */
        .map-wrapper { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }

        .gps-button {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            padding: 12px 18px;
            background: #fff;
            border: 2px solid var(--point-blue);
            border-radius: 50px;
            font-weight: bold;
            color: var(--point-blue);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .gps-button.active { background: var(--point-blue); color: #fff; }

        /* 인포윈도우(팝업) 스타일 */
        .info-window { padding: 10px; font-size: 13px; line-height: 1.5; min-width: 150px; }
        .info-window b { color: var(--point-blue); }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="search-header">
            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소, 맛집 검색..." onkeypress="if(event.keyCode==13) searchPlaces()">
                <button onclick="searchPlaces()">검색</button>
            </div>
        </div>
        <div id="result-list"></div>
    </aside>

    <main class="map-wrapper">
        <div id="map"></div>
        <button id="track-btn" class="gps-button" onclick="toggleTracking()">내 위치 추적 꺼짐</button>
    </main>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=cbbdd4b68f27b3ad77d20589390becce&libraries=services"></script>

<script>
    let map;
    let ps; // 장소 검색 객체
    let infowindow; // 정보를 보여줄 팝업 객체
    let markers = []; // 검색된 마커 배열
    let myLocationMarker = null; // 내 위치 마커
    let watchId = null; // 실시간 위치 추적용 ID

    // 1. 지도 초기 기동
    function initMap() {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.5668, 126.9786),
            level: 5
        };
        map = new kakao.maps.Map(container, options);
        ps = new kakao.maps.services.Places(); // 장소 검색 서비스 객체 생성
        infowindow = new kakao.maps.InfoWindow({ zIndex: 1 }); // 인포윈도우 생성

        // 초기 접속 시 내 위치로 중심 설정
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const currentPos = new kakao.maps.LatLng(lat, lng);
                map.setCenter(currentPos);
                updateMyMarker(currentPos);
            });
        }
    }

    // 2. 키워드 검색 실행
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;
        if (!keyword.trim()) {
            alert("검색어를 입력해주세요!");
            return;
        }

        // 카카오 장소 검색 API 호출 (키워드로 검색)
        ps.keywordSearch(keyword, placesSearchCB);
    }

    // 3. 검색 결과 콜백 함수
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data); // 검색 성공 시 리스트/마커 표시
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert("검색 결과가 존재하지 않습니다.");
        } else if (status === kakao.maps.services.Status.ERROR) {
            alert("검색 중 오류가 발생했습니다.");
        }
    }

    // 4. 검색 결과 마커/리스트 렌더링
    function displayPlaces(places) {
        const listEl = document.getElementById('result-list');
        const bounds = new kakao.maps.LatLngBounds();
        
        listEl.innerHTML = ''; // 기존 리스트 삭제
        removeMarkers(); // 기존 마커 삭제

        for (let i = 0; i < places.length; i++) {
            const position = new kakao.maps.LatLng(places[i].y, places[i].x);
            const marker = addMarker(position); // 지도에 마커 추가
            const item = getListItem(i, places[i]); // 리스트 아이템 생성

            bounds.extend(position); // 전체 검색 결과가 보이도록 범위 확장

            // 마커 및 리스트 클릭 이벤트 바인딩
            (function(marker, place) {
                // 지도 마커 클릭 시 팝업
                kakao.maps.event.addListener(marker, 'click', function() {
                    displayInfoWindow(marker, place);
                });

                // 리스트 아이템 클릭 시 지도 이동 및 팝업
                item.onclick = function() {
                    map.panTo(position);
                    map.setLevel(3);
                    displayInfoWindow(marker, place);
                };
            })(marker, places[i]);

            listEl.appendChild(item);
        }

        map.setBounds(bounds); // 지도 범위를 검색 결과에 맞게 조정
    }

    // 5. 마커 생성 함수 (검색 결과용)
    function addMarker(position) {
        const marker = new kakao.maps.Marker({
            position: position,
            map: map
        });
        markers.push(marker);
        return marker;
    }

    // 6. 팝업(인포윈도우) 표시 함수
    function displayInfoWindow(marker, place) {
        const content = `
            <div class="info-window">
                <b>${place.place_name}</b><br>
                ${place.road_address_name ? place.road_address_name : place.address_name}<br>
                ${place.phone ? '<span style="color:#666">' + place.phone + '</span>' : ''}
            </div>
        `;
        infowindow.setContent(content);
        infowindow.open(map, marker);
    }

    // 7. 리스트 아이템 DOM 생성 함수
    function getListItem(index, place) {
        const el = document.createElement('div');
        el.className = 'item';
        el.innerHTML = `
            <div class="title">${place.place_name}</div>
            <div class="addr">${place.road_address_name || place.address_name}</div>
        `;
        return el;
    }

    // 8. 기존 검색 마커 제거
    function removeMarkers() {
        markers.forEach(m => m.setMap(null));
        markers = [];
        infowindow.close(); // 팝업도 닫기
    }

    // 9. 실시간 위치 추적 기능
    function toggleTracking() {
        const btn = document.getElementById('track-btn');

        if (watchId === null) {
            if (!navigator.geolocation) return alert("Geolocation을 지원하지 않습니다.");
            
            btn.classList.add('active');
            btn.innerText = "내 위치 추적 켜짐";

            watchId = navigator.geolocation.watchPosition(position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const currentPos = new kakao.maps.LatLng(lat, lng);
                
                updateMyMarker(currentPos);
                map.panTo(currentPos);
            }, null, { enableHighAccuracy: true });
        } else {
            stopTracking();
        }
    }

    function stopTracking() {
        const btn = document.getElementById('track-btn');
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
        btn.classList.remove('active');
        btn.innerText = "내 위치 추적 꺼짐";
    }

    // 내 위치 마커 업데이트 (별 모양 이미지)
    function updateMyMarker(pos) {
        if (myLocationMarker) {
            myLocationMarker.setPosition(pos);
        } else {
            const image = new kakao.maps.MarkerImage(
                'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
                new kakao.maps.Size(24, 35)
            );
            myLocationMarker = new kakao.maps.Marker({ position: pos, image: image, map: map });
        }
    }

    // 앱 실행
    initMap();
</script>

</body>
</html>
