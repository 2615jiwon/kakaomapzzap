<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 Wishcore Map 🌈</title>
    <style>
        /* CSS 스타일링: 위시코어 테마 */
        :root {
            --bg-gradient: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 50%, #f3e5f5 100%);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --accent-pink: #ff80ab;
            --neon-blue: #40c4ff;
            --text-main: #5c5c5c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Malgun Gothic', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100vh;
            padding: 15px;
            gap: 15px;
        }

        /* 왼쪽 사이드바: 검색창 및 리스트 */
        .sidebar {
            width: 380px;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(255, 128, 171, 0.15);
            z-index: 10;
        }

        h2 {
            font-size: 1.5rem;
            color: var(--accent-pink);
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05);
            outline: none;
        }

        .search-box button {
            padding: 10px 18px;
            background: var(--accent-pink);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 128, 171, 0.3);
        }

        .search-box button:hover {
            transform: scale(1.05);
            background: var(--neon-blue);
        }

        #result-list {
            flex-grow: 1;
            overflow-y: auto;
            list-style: none;
            padding-right: 5px;
        }

        #result-list li {
            padding: 15px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        #result-list li:hover {
            background: white;
            border: 1px solid var(--accent-pink);
            transform: translateY(-3px);
        }

        .place-name {
            font-weight: bold;
            color: #7b1fa2;
            display: block;
        }

        .address {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }

        /* 오른쪽: 지도 영역 */
        .map-wrapper {
            flex-grow: 1;
            height: 100%;
            position: relative;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 6px solid white;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* 내 위치 추적 버튼 */
        .tracking-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s;
        }

        .tracking-btn.active {
            background: var(--neon-blue);
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(64, 196, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(64, 196, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(64, 196, 255, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <h2>✨ Dreamy
