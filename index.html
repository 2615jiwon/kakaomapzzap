<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Blue Map Service</title>
    <style>
        /* CSS 스타일링: 하늘색 테마 */
        :root {
            --main-blue: #00aaff;
            --light-blue: #e6f7ff;
            --border-color: #bae7ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }

        .container { display: flex; width: 100%; height: 100vh; }

        /* 왼쪽 사이드바 (25%) */
        .sidebar {
            width: 350px;
            height: 100%;
            background-color: var(--light-blue);
            border-right: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .search-container { margin-bottom: 20px; display: flex; gap: 5px; }
        #keyword {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--main-blue);
            border-radius: 4px;
        }
        #search-btn {
            padding: 10px 15px;
            background-color: var(--main-blue);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #result-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }
        #result-list li {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
        }
        #result-list li:hover { background-color: #f0faff; border-color: var(--main-blue); }
        .place-name { font-weight: bold; color: #0077cc; display: block; }
        .address { font-size: 12px; color: #666; margin-top: 5px; }

        /* 오른쪽 지도 (75%) */
        .map-area { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }

        /* 내 위치 추적 버튼 */
        #track-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            padding: 12px 20px;
            background: white;
            border: 2px solid var(--main-blue);
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            color: var(--main-blue);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #track-btn.active {
            background: var(--main-blue);
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="search-container">
                <input type="text" id="keyword" placeholder="장소, 맛집 검색..." onkeypress="if(event.keyCode==13) searchPlaces()">
                <button id="search-btn" onclick="searchPlaces()">검색</button>
            </div>
            <ul id="result-list"></ul>
        </div>

        <div class="map-area">
            <div id="map"></div>
            <button id="track-btn" onclick="toggleTracking()">내 위치 추적 OFF</button>
        </div>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=cbbdd4b68f27b3ad77d20589390becce&libraries=services"></script>
    
    <script>
        let map;
        let ps; // 장소 검색 객체
        let markers = []; // 검색 결과 마커 배열
        let watchId = null; // 실시간 위치 추적 ID
        let myMarker = null; // 내 위치 표시용 마커

        // 1. 지도 초기화 및 현재 위치 설정
        function init() {
            const container = document.getElementById('map');
            const options = {
                center: new kakao.maps.LatLng(37.5668, 126.9786), // 서울시청 기본값
                level: 5 // 확대 레벨 5
            };

            map = new kakao.maps.Map(container, options);
            ps = new kakao.maps.services.Places();

            // 접속 시 현재 위치 권한 요청
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const currentPos = new kakao.maps.LatLng(lat, lng);
                    map.setCenter(currentPos); // 현재 위치로 중심 이동
                    drawMyMarker(currentPos); // 내 위치 마커 표시
                }, () => {
                    alert('위치 권한을 허용해주세요!');
                });
            }
        }

        // 2. 장소 검색 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;
            if (!keyword.trim()) return alert('키워드를 입력하세요!');

            ps.keywordSearch(keyword, (data, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    displayResults(data);
                } else {
                    alert('검색 결과가 없습니다.');
                }
            });
        }

        // 3. 검색 결과 표시
        function displayResults(places) {
            const listEl = document.getElementById('result-list');
            const bounds = new kakao.maps.LatLngBounds();
            listEl.innerHTML = '';
            clearMarkers();

            places.forEach((place) => {
                const pos = new kakao.maps.LatLng(place.y, place.x);
                const marker = new kakao.maps.Marker({ position: pos, map: map });
                markers.push(marker);
                bounds.extend(pos);

                const li = document.createElement('li');
                li.innerHTML = `<span class="place-name">${place.place_name}</span>
                                <span class="address">${place.road_address_name || place.address_name}</span>`;
                li.onclick = () => {
                    map.panTo(pos);
                    map.setLevel(3);
                };
                listEl.appendChild(li);
            });
            map.setBounds(bounds); // 결과가 모두 보이게 지도 조정
        }

        // 4. 실시간 위치 추적 토글
        function toggleTracking() {
            const btn = document.getElementById('track-btn');

            if (watchId === null) {
                // 추적 시작
                if (navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(position => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        const currentPos = new kakao.maps.LatLng(lat, lng);
                        
                        map.panTo(currentPos); // 내 위치로 부드럽게 이동
                        drawMyMarker(currentPos);
                    });
                    btn.innerText = "내 위치 추적 ON";
                    btn.classList.add('active');
                }
            } else {
                // 추적 중지
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                btn.innerText = "내 위치 추적 OFF";
                btn.classList.remove('active');
            }
        }

        // 내 위치 마커 그리기
        function drawMyMarker(pos) {
            if (myMarker) {
                myMarker.setPosition(pos);
            } else {
                myMarker = new kakao.maps.Marker({
                    position: pos,
                    map: map,
                    image: new kakao.maps.MarkerImage(
                        'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
                        new kakao.maps.Size(24, 35)
                    )
                });
            }
        }

        function clearMarkers() {
            markers.forEach(m => m.setMap(null));
            markers = [];
        }

        // 앱 시작
        init();
    </script>
</body>
</html>
